<title>AlbionEdge — Build Guides</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f13; color: #e8e6e0; min-height: 100vh; }

  .header { background: #16161f; border-bottom: 1px solid #2a2a3a; padding: 14px 24px; display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 30px; height: 30px; }
  .logo-text { font-size: 16px; font-weight: 600; color: #c9a84c; letter-spacing: -0.3px; }
  .logo-sub { font-size: 12px; color: #666; margin-left: 2px; }

  .nav { background: #16161f; border-bottom: 1px solid #2a2a3a; display: flex; overflow-x: auto; padding: 0 16px; gap: 2px; }
  .nav-tab { padding: 11px 16px; font-size: 13px; color: #888; cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; margin-bottom: -1px; display: flex; align-items: center; gap: 6px; text-decoration: none; transition: color 0.15s; }
  .nav-tab:hover { color: #ccc; }
  .nav-tab.active { color: #c9a84c; border-bottom-color: #c9a84c; }
  .nav-tab.coming-soon { color: #444; cursor: default; }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 20px; }
  .page-title { font-size: 22px; font-weight: 600; color: #e8e6e0; margin-bottom: 4px; }
  .page-sub { font-size: 14px; color: #666; margin-bottom: 24px; }

  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .filter-btn { padding: 7px 16px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 1px solid #2a2a3a; background: transparent; color: #888; transition: all 0.15s; }
  .filter-btn:hover { border-color: #c9a84c; color: #c9a84c; }
  .filter-btn.active { background: #c9a84c; color: #0f0f13; border-color: #c9a84c; font-weight: 500; }

  .builds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  .build-card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.15s; }
  .build-card:hover { border-color: #3a3a4a; }
  .build-card.open { border-color: #c9a84c; }

  .build-card-header { padding: 16px 18px; display: flex; align-items: flex-start; gap: 14px; }
  .build-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .build-meta { flex: 1; }
  .build-category { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .build-name { font-size: 15px; font-weight: 600; color: #e8e6e0; margin-bottom: 8px; }
  .build-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #1e1e2a; color: #888; border: 1px solid #2a2a3a; }
  .tag.highlight { background: #2a2010; color: #c9a84c; border-color: #3a3010; }
  .build-arrow { color: #444; font-size: 16px; transition: transform 0.2s; flex-shrink: 0; margin-top: 2px; }
  .build-card.open .build-arrow { transform: rotate(180deg); color: #c9a84c; }

  .build-detail { display: none; border-top: 1px solid #2a2a3a; padding: 18px; }
  .build-card.open .build-detail { display: block; }

  .detail-section { margin-bottom: 18px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; font-weight: 500; }

  .gear-grid { display: flex; flex-direction: column; gap: 6px; }
  .gear-row { display: flex; align-items: center; gap: 10px; background: #0f0f13; border-radius: 6px; padding: 8px 12px; }
  .gear-slot-label { font-size: 11px; color: #555; min-width: 72px; }
  .gear-item-name { font-size: 13px; color: #e8e6e0; font-weight: 500; flex: 1; }
  .gear-note { font-size: 11px; color: #666; }

  .tips-list { display: flex; flex-direction: column; gap: 8px; }
  .tip { display: flex; gap: 10px; font-size: 13px; color: #aaa; line-height: 1.5; }
  .tip-arrow { color: #c9a84c; flex-shrink: 0; font-weight: 600; }

  .diff-bar { display: flex; gap: 6px; margin-top: 8px; }
  .diff-item { flex: 1; text-align: center; }
  .diff-label { font-size: 10px; color: #555; margin-bottom: 4px; }
  .diff-track { height: 4px; background: #1e1e2a; border-radius: 2px; overflow: hidden; }
  .diff-fill { height: 100%; border-radius: 2px; background: #c9a84c; }

  .cost-estimate { display: flex; justify-content: space-between; align-items: center; background: #0f0f13; border-radius: 6px; padding: 10px 14px; margin-top: 8px; }
  .cost-label { font-size: 12px; color: #666; }
  .cost-val { font-size: 14px; font-weight: 600; color: #c9a84c; }

  .empty { padding: 48px 20px; text-align: center; color: #555; }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
</style>

let currentFilter = 'all';

function filter(tag, btn) {
  currentFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBuilds();
}

function toggleBuild(id) {
  const card = document.getElementById('card-' + id);
  const isOpen = card.classList.contains('open');
  document.querySelectorAll('.build-card').forEach(c => c.classList.remove('open'));
  if (!isOpen) card.classList.add('open');
}

function diffBar(value, max) {
  const pct = Math.round((value / max) * 100);
  return `<div class="diff-track"><div class="diff-fill" style="width:${pct}%"></div></div>`;
}

function renderBuilds() {
  const grid = document.getElementById('buildsGrid');
  const filtered = currentFilter === 'all'
    ? BUILDS
    : BUILDS.filter(b => b.filters.includes(currentFilter));

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No builds match this filter.</div></div>';
    return;
  }

  grid.innerHTML = filtered.map(b => `
    <div class="build-card" id="card-${b.id}" onclick="toggleBuild('${b.id}')">
      <div class="build-card-header">
        <div class="build-icon">${b.icon}</div>
        <div class="build-meta">
          <div class="build-category">${b.category}</div>
          <div class="build-name">${b.name}</div>
          <div class="build-tags">
            ${b.tags.map((t,i) => `<span class="tag${i===0?' highlight':''}">${t}</span>`).join('')}
          </div>
        </div>
        <div class="build-arrow">▼</div>
      </div>
      <div class="build-detail">
        <div class="detail-section">
          <div class="detail-label">Gear</div>
          <div class="gear-grid">
            ${b.gear.map(g => `
              <div class="gear-row">
                <span class="gear-slot-label">${g.slot}</span>
                <span class="gear-item-name">${g.item}</span>
                ${g.note ? `<span class="gear-note">${g.note}</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Difficulty</div>
          <div class="diff-bar">
            ${[1,2,3,4,5].map(i => `
              <div class="diff-item">
                <div class="diff-track"><div class="diff-fill" style="width:${i <= b.difficulty ? 100 : 0}%"></div></div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-label">Tips</div>
          <div class="tips-list">
            ${b.tips.map(t => `<div class="tip"><span class="tip-arrow">→</span><span>${t}</span></div>`).join('')}
          </div>
        </div>
        <div class="cost-estimate">
          <span class="cost-label">Estimated cost</span>
          <span class="cost-val">${b.cost}</span>
        </div>
      </div>
    </div>
  `).join('');
}
